services:
  keycloak:
    image: quay.io/keycloak/keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_IMPORT: /opt/keycloak/data/import/specmatic-realm.json
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    healthcheck:
      test:
        ["CMD", "bash", "-lc", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /realms/specmatic/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -n 1 <&3 | grep -q '200 OK'"]
      interval: 5s
      timeout: 3s
      retries: 18
      start_period: 10s
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    ports:
      - "8083:8080"

  order-api:
    image: specmaticdemo/specmatic-order-api-java-with-oauth
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/specmatic
    healthcheck:
      test: ["CMD-SHELL", "status=$$(curl -fsS -o /dev/null -w '%{http_code}' http://localhost:8080/actuator/mappings || true); [ \"$$status\" = \"200\" ] || [ \"$$status\" = \"401\" ]"]
      interval: 5s
      timeout: 3s
      retries: 18
      start_period: 10s
    ports:
      - "8080:8080"
    restart: on-failure

  specmatic-test:
    image: specmatic/enterprise:latest
    depends_on:
      keycloak:
        condition: service_healthy
      order-api:
        condition: service_healthy
    environment:
      APP_BASE_URL: http://order-api:8080
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_USER_USERNAME: user1
      KEYCLOAK_USER_PASSWORD: password
      KEYCLOAK_ADMIN_USERNAME: admin1
      KEYCLOAK_ADMIN_PASSWORD: password
    volumes:
      - .:/usr/src/app
      - ../license.txt:/specmatic/specmatic-license.txt:ro
    command: ["test"]
