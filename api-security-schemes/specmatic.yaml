version: 3
systemUnderTest:
  service:
    $ref: "#/components/services/orderService"
    runOptions:
      $ref: "#/components/runOptions/orderServiceTest"
    data:
      examples:
        - directories:
            - ./auth_examples
    settings:
      schemaResiliencyTests: all
specmatic:
  governance:
    successCriteria:
      minCoveragePercentage: 70
      maxMissedOperationsInSpec: 4
      enforce: true
  license:
    path: /specmatic/specmatic-license.txt
components:
  sources:
    labsContracts:
      git:
        url: https://github.com/specmatic/labs-contracts.git
        branch: main
  services:
    orderService:
      description: Order Service with Multiple Auth Schemes
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/labsContracts"
            specs:
              - spec:
                  id: orderApiSpec
                  path: openapi/security/order-api-with-auth.yaml
  runOptions:
    orderServiceTest:
      openapi:
        type: test
        filter: "PATH!='/internal/metrics'"
        baseUrl: ${APP_BASE_URL:http://localhost:8080}
        actuatorUrl: ${APP_BASE_URL:http://localhost:8080}/actuator/mappings
        specs:
          - spec:
              id: orderApiSpec
              securitySchemes:
                basicAuth:
                  type: basicAuth
                  token: ${BASIC_AUTH_TOKEN:dXNlcjpwYXNzd29yZA==}
                apiKeyAuth:
                  type: apiKey
                  token: ${API_KEY:APIKEY1234}
