services:
  suite:
    container_name: suite
    image: specmatic/enterprise:latest
    volumes:
      - ./:/usr/src/app
      - ../license.txt:/specmatic/specmatic-license.txt
    command: ["run-suite"]

  studio:
    container_name: schema-resiliency-testing-studio
    image: specmatic/enterprise:latest
    profiles: ["studio"]
    volumes:
      - ./:/usr/src/app
      - ../license.txt:/specmatic/specmatic-license.txt:ro
    command: ["studio"]
    ports:
      - "9000:9000"
      - "9001:9001"
