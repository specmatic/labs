version: 3

components:
  sources:
    labsContracts:
      git:
        url: https://github.com/specmatic/labs-contracts.git
        branch: main

systemUnderTest:
  service:
    definitions:
      - definition:
          source:
            $ref: "#/components/sources/labsContracts"
          specs:
            - openapi/verification/verification-api.yaml
    runOptions:
      openapi:
        type: test
        baseUrl: "${APP_URL:http://verification-service:8080}"
    data:
      examples:
        - directories:
            - ./examples

specmatic:
  settings:
    test:
      strictMode: true
      schemaResiliencyTests: none
  license:
    path: /specmatic/specmatic-license.txt
