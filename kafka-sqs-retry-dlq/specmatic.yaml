version: 3
systemUnderTest:
  service:
    $ref: "#/components/services/sqsKafkaService"
    runOptions:
      $ref: "#/components/runOptions/sqsKafkaServiceTest"
    data:
      examples:
        - directories:
            - spec/order-service-sqs-kafka_examples
    settings:
      strictMode: true
components:
  sources:
    labsContracts:
      git:
        url: https://github.com/specmatic/labs-contracts.git
        branch: main
  services:
    sqsKafkaService:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/labsContracts"
            specs:
              - asyncapi/kafka-sqs-retry-dlq/order-service-sqs-kafka.yaml
  runOptions:
    sqsKafkaServiceTest:
      asyncapi:
        type: test
        servers:
          - host: http://localstack:4566/000000000000
            protocol: sqs
            adminCredentials:
              region: us-east-1
              aws.access.key.id: test
              aws.secret.access.key: test
          - host: kafka:9092
            protocol: kafka
