version: 3

components:
  sources:
    labsContracts:
      git:
        url: https://github.com/specmatic/labs-contracts.git
        branch: main

systemUnderTest:
  service:
    definitions:
      - definition:
          source:
            $ref: "#/components/sources/labsContracts"
          specs:
            - openapi/dictionary/simple-openapi-spec.yaml
    runOptions:
      openapi:
        type: test
        baseUrl: "${APP_URL:http://localhost:8080}"
        filter: "PATH!='/health,/monitor/{id},/swagger'"
    data:
      examples:
        - directories:
            - ./examples

dependencies:
  services:
    - service:
        definitions:
          - definition:
              source:
                $ref: "#/components/sources/labsContracts"
              specs:
                - openapi/dictionary/simple-openapi-spec.yaml
        runOptions:
          openapi:
            type: mock
            baseUrl: "${APP_URL:http://localhost:8080}"

specmatic:
  settings:
    test:
      strictMode: true
      schemaResiliencyTests: none
  license:
    path: /specmatic/specmatic-license.txt
