services:
  tasks-service:
    build:
      context: ./service
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/actuator/health', timeout=2)"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s

  test:
    image: specmatic/enterprise
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
    command: ["test"]
    environment:
      TASKS_BASE_URL: http://tasks-service:9000
    depends_on:
      tasks-service:
        condition: service_healthy
