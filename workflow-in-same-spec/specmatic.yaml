version: 3

systemUnderTest:
  service:
    definitions:
      - definition:
          source:
            filesystem:
              directory: ./specs
          specs:
            - spec:
                path: tasks.yaml
    data:
      examples:
        - directories:
            - ./examples
    runOptions:
      openapi:
        type: test
        baseUrl: "${TASKS_BASE_URL:http://127.0.0.1:8090}"

specmatic:
  settings:
    general:
      ignoreInlineExamples: true
