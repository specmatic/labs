version: 3

components:
  sources:
    labsContracts:
      git:
        url: https://github.com/specmatic/labs-contracts.git
        branch: main

systemUnderTest:
  service:
    definitions:
      - definition:
          source:
            $ref: "#/components/sources/labsContracts"
          specs:
            - spec:
                path: openapi/workflow-in-same-spec/tasks.yaml
    data:
      examples:
        - directories:
            - ./examples
    runOptions:
      openapi:
        type: test
        baseUrl: "${TASKS_BASE_URL:http://127.0.0.1:8090}"

specmatic:
  settings:
    general:
      ignoreInlineExamples: true
