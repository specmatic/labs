name: Client CI with Virtualized BFF

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  client-tests:
    runs-on: ubuntu-latest
    env:
      PUBLISH_TO_INSIGHTS: ${{ github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Start Specmatic mock for Order BFF
        run: |
          docker run -d --name order-bff-mock \
            -v ${{ github.workspace }}:/usr/src/app \
            -p 9000:9000 \
            specmatic/enterprise \
            mock

      - name: Run client tests against virtualized BFF
        env:
          BFF_BASE_URL: http://127.0.0.1:9000
        run: npm test

      - name: Stop Specmatic mock
        if: always()
        run: docker rm -f order-bff-mock

      - name: Write specmatic license key to file
        if: env.PUBLISH_TO_INSIGHTS == 'true'
        run: |
          mkdir -p ~/.specmatic
          echo "${{ secrets.SPECMATIC_LICENSE_KEY }}" > ~/.specmatic/specmatic-license.txt

      - name: Publish Build Reports to Specmatic Insights
        if: env.PUBLISH_TO_INSIGHTS == 'true'
        run: |
          docker run --rm \
            -v ~/.specmatic:/root/.specmatic \
            -v ${{ github.workspace }}:/usr/src/app \
            specmatic/enterprise \
            send-report \
            --branch-name ${{ github.ref_name }} \
            --repo-name ${{ github.event.repository.name }} \
            --repo-id ${{ github.repository_id }} \
            --repo-url ${{ github.event.repository.html_url }}
