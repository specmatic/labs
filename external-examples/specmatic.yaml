version: 3

components:
  sources:
    labsContracts:
      git:
        url: https://github.com/specmatic/labs-contracts.git
        branch: main

systemUnderTest:
  service:
    definitions:
      - definition:
          source:
            $ref: "#/components/sources/labsContracts"
          specs:
            - common/openapi/order-bff/product_search_bff_v6.yaml
    runOptions:
      openapi:
        type: test
        baseUrl: "${APP_URL:http://localhost:8080}"
    data:
      examples:
        - directories:
            - ./examples

specmatic:
  license:
    path: /specmatic/specmatic-license.txt
