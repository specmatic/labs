version: 3

components:
  sources:
    labsContracts:
      git:
        url: https://github.com/specmatic/labs-contracts.git
        branch: main

dependencies:
  services:
    - service:
        description: Service using camelCase contract
        definitions:
          - definition:
              source:
                $ref: "#/components/sources/labsContracts"
              specs:
                - openapi/data-adapters/camelCase.yaml
        runOptions:
          openapi:
            type: mock
            baseUrl: http://0.0.0.0:9090
