version: 3

components:
  sources:
    labsContracts:
      git:
        url: https://github.com/specmatic/labs-contracts.git
        branch: main

systemUnderTest:
  service:
    definitions:
      - definition:
          source:
            $ref: "#/components/sources/labsContracts"
          specs:
            - openapi/order-bff-resiliency/product_search_bff_v6.yaml
    runOptions:
      openapi:
        type: test
        baseUrl: "${APP_URL:http://order-bff:8080}"
        filter: "PATH!='/health,/monitor/{id},/swagger,/orders'"
        actuatorUrl: "${APP_URL:http://order-bff:8080}/actuator/mappings"
    data:
      examples:
        - directories:
            - ./examples/bff
    settings:
      schemaResiliencyTests: none

dependencies:
  services:
    - service:
        definitions:
          - definition:
              source:
                $ref: "#/components/sources/labsContracts"
              specs:
                - common/openapi/order-api/api_order_v5.yaml
        runOptions:
          openapi:
            type: mock
            baseUrl: "${ORDER_API_URL:http://localhost:8090}"
        data:
          examples:
            - directories:
                - ./examples/order-service
    - service:
        definitions:
          - definition:
              source:
                $ref: "#/components/sources/labsContracts"
              specs:
                - common/asyncapi/product-audits/kafka.yaml
        runOptions:
          asyncapi:
            type: mock
            inMemoryBroker:
              host: "${KAFKA_BOOTSTRAP_SERVER_HOST:localhost}"
              port: 9092
            servers:
              - host: "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"
                protocol: kafka
  data:
    adapters:
      post_specmatic_response_processor: ./hooks/post_specmatic_response_processor.sh

specmatic:
  license:
    path: /specmatic/specmatic-license.txt
