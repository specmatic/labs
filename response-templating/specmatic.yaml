version: 3

components:
  sources:
    labsContracts:
      git:
        url: https://github.com/specmatic/labs-contracts.git
        branch: main

systemUnderTest:
  service:
    definitions:
      - definition:
          source:
            $ref: "#/components/sources/labsContracts"
          specs:
            - openapi/response-templating/simple-openapi-spec.yaml
    runOptions:
      openapi:
        type: test
        baseUrl: "${APP_URL:http://localhost:8080}"
        filter: "PATH!='/health,/monitor/{id},/swagger' && TAGS!='WIP' && STATUS!='202,429'"
    data:
      examples:
        - directories:
            - ./examples/test

dependencies:
  services:
    - service:
        definitions:
          - definition:
              source:
                $ref: "#/components/sources/labsContracts"
              specs:
                - openapi/response-templating/simple-openapi-spec.yaml
        runOptions:
          openapi:
            type: mock
            baseUrl: "${APP_URL:http://localhost:8080}"
        data:
          examples:
            - directories:
                - ./examples/mock

specmatic:
  license:
    path: /specmatic/specmatic-license.txt
