services:
  mcp-server:
    container_name: mcp-server
    build:
      context: ./service
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 2s
      timeout: 1s
      retries: 30
      start_period: 2s

  mcp-test:
    container_name: mcp-auto-test
    build:
      context: .
      dockerfile: ./script/Dockerfile
    working_dir: /usr/src/app
    volumes:
      - ./:/usr/src/app
    depends_on:
      mcp-server:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - script/run_mcp_test_and_report.sh
