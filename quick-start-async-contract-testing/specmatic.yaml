version: 3

components:
  sources:
    labsContracts:
      git:
        url: https://github.com/specmatic/labs-contracts.git
        branch: main

systemUnderTest:
  service:
    definitions:
      - definition:
          source:
            $ref: "#/components/sources/labsContracts"
          specs:
            - asyncapi/quick-start/async.yaml
    runOptions:
      asyncapi:
        type: test
        servers:
          - host: kafka:9092
            protocol: kafka

specmatic:
  license:
    path: /specmatic/specmatic-license.txt
